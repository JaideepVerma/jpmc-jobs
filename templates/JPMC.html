<!DOCTYPE html>

<head>
    <title>Job Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; text-align: left; }
        tr:hover { background-color: #f9f9f9; }
        a { color: blue; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Latest Job Openings</h1>
    <div id="lastReload" style="float:right; font-size:14px; color:#555;"></div>
    <!-- <div id="lastReload"></div> -->
     <div id="jobs">Loading jobs...</div>
    
<script>
     // Show last reload timestamp
    /*
        function updateReloadTime() {
        const now = new Date();
        const formatted = now.toLocaleString(); // e.g. "4/5/2026, 7:31:00 PM"
        document.getElementById("lastReload").textContent = "Last reload: " + formatted;
      }
      */
     
  // Fetch the JSON file

      fetch("data.json")
        .then(response => response.json())
        .then(data => {
          const container = document.getElementById("jobs");
          if (!container) return;

          let html = "<table><tr>";
          // Add headers
          Object.keys(data[0]).forEach(key => {
            html += `<th>${key}</th>`;
          });
          html += "</tr>";

          // Add rows
          data.forEach(row => {
            html += "<tr>";
            Object.values(row).forEach(value => {
              // Special case: apply_link should be clickable
              if (String(value).startsWith("http")) {
                html += `<td><a href="${value}" target="_blank">Apply</a></td>`;
              } else {
                html += `<td>${value ?? ""}</td>`;
              }
            });
            html += "</tr>";
          });

          html += "</table>";
          container.innerHTML = html;
            // Update reload time after data loads
          updateReloadTime();
        })
        .catch(err => console.error("Error loading data:", err));
   // ✅ Show last loaded timestamp from JSON
      const lastReloadDiv = document.getElementById("lastReload");
      if (lastReloadDiv) {
        // Use the most recent "loaded_at" field
        const lastLoaded = data[data.length - 1].loaded_at;
        lastReloadDiv.textContent = "Last job load: " + lastLoaded;
      }
</script>
