<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Viewer</title>
  <style>
    :root {
      --background: #ffffff;
      --foreground: #0a0a0a;
      --card: #ffffff;
      --card-foreground: #0a0a0a;
      --border: #e5e5e5;
      --input: #e5e5e5;
      --primary: #171717;
      --primary-foreground: #fafafa;
      --muted: #f5f5f5;
      --muted-foreground: #737373;
      --accent: #f5f5f5;
      --radius: 8px;
    }

    [data-theme="dark"] {
      --background: #0a0a0a;
      --foreground: #fafafa;
      --card: #0a0a0a;
      --card-foreground: #fafafa;
      --border: #262626;
      --input: #262626;
      --primary: #fafafa;
      --primary-foreground: #171717;
      --muted: #262626;
      --muted-foreground: #a3a3a3;
      --accent: #262626;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      transition: background-color 0.2s, color 0.2s;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: var(--background);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }

    .header-content {
      max-width: none;   
      margin: 0 ;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 1rem;
      padding: 0 0.5rem;
    }

    .site-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--foreground);
      white-space: nowrap;
    }

    .search-container {
      position: relative;
      flex: 1;
      max-width: 500px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-foreground);
      width: 16px;
      height: 16px;
    }

    .search-input {
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      background-color: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--foreground);
      font-size: 0.875rem;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-input::placeholder {
      color: var(--muted-foreground);
    }

    .theme-toggle {
      padding: 0.5rem;
      background: transparent;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--foreground);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background-color: var(--accent);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    main {
      max-width: none;
      margin: 0 ;
      padding: 1.5rem 0.5rem;
    }

    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--foreground);
    }

    .page-subtitle {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      margin-top: 0.25rem;
    }

    .table-container {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead {
      background-color: var(--muted);
    }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 500;
      color: var(--muted-foreground);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--foreground);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.link-cell a {
      color: #3b82f6;
      text-decoration: none;
    }

    td.link-cell a:hover {
      text-decoration: underline;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background-color: var(--muted);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted-foreground);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      opacity: 0.5;
    }

    .loading-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted-foreground);
    }

    .error-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #dc2626;
    }

    @media (max-width: 640px) {
      .header-content {
        flex-wrap: wrap;
        height: auto;
        padding: 0.75rem 0;
        gap: 0.75rem;
      }

      .search-container {
        order: 3;
        max-width: 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="site-title" id="siteTitle">Data Viewer</div>

      <div class="search-container">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="search" class="search-input" id="searchInput" placeholder="Search across all columns...">
      </div>

      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/>
          <path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/>
          <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
        </svg>
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1 class="page-title" id="pageTitle">Data Viewer</h1>
      <p class="page-subtitle" id="pageSubtitle">Loading data...</p>
    </div>

    <div class="table-container">
      <div class="table-scroll">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="15">
                <div class="loading-state">Loading data...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // ============================================================
    // CONFIGURATION - Set your JSON file path here
    // ============================================================
    const DATA_FILE = "data.json";
    const PAGE_TITLE = "Job Listings"; // Change this to your preferred title
    
    // Your JSON should be a simple array of objects like:
    // [
    //   {
    //     "id": 1,
    //     "company": "JPMC",
    //     "job_id": "210731393",
    //     "role": "Data Owner Lead",
    //     "description": "...",
    //     "responsibilities": null,
    //     "qualifications": null,
    //     "location": "Bengaluru",
    //     "posting_date": "2026-04-06",
    //     "job_family": "Analytics",
    //     "job_function": "Data & Analytics",
    //     "apply_link": "https://...",
    //     "posted_at": "2026-04-06 17:40:27",
    //     "loaded_at": "2026-04-06 23:10:27"
    //   }
    // ]
    // ============================================================

    // State
    let rawData = [];
    let columns = [];
    let searchQuery = '';
    let isDarkMode = false;

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const siteTitle = document.getElementById('siteTitle');
    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');
    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');

    // Format column names (snake_case to Title Case)
    function formatColumnName(key) {
      return key
        .split('_')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    // Load JSON file
    async function loadJSON() {
      try {
        const response = await fetch(DATA_FILE);
        if (!response.ok) {
          throw new Error(`Failed to load ${DATA_FILE} (Status: ${response.status})`);
        }
        const data = await response.json();
        
        // Handle flat array format (your format)
        if (Array.isArray(data)) {
          rawData = data;
          // Extract columns from first object's keys
          if (data.length > 0) {
            columns = Object.keys(data[0]);
          }
        } 
        // Also support nested format for flexibility
        else if (data.data && Array.isArray(data.data)) {
          rawData = data.data;
          columns = data.columns || (data.data.length > 0 ? Object.keys(data.data[0]) : []);
        }

        siteTitle.textContent = PAGE_TITLE;
        pageTitle.textContent = PAGE_TITLE;
        document.title = PAGE_TITLE;
        
        renderTable();
      } catch (error) {
        console.error("Error loading JSON:", error);
        tableBody.innerHTML = `
          <tr>
            <td colspan="15">
              <div class="error-state">
                <p><strong>Error loading data</strong></p>
                <p style="margin-top: 0.5rem; font-size: 0.8rem;">${error.message}</p>
                <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--muted-foreground);">
                  Make sure "${DATA_FILE}" exists in the same folder as this HTML file.<br>
                  If running locally, use a server (e.g., <code>python -m http.server 8000</code>)
                </p>
              </div>
            </td>
          </tr>
        `;
        pageSubtitle.textContent = "Failed to load data";
      }
    }

    // Search functionality
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      renderTable();
    });

    // Theme toggle
    function updateThemeIcons() {
      if (isDarkMode) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    }

    themeToggle.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      updateThemeIcons();
    });

    function loadTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        isDarkMode = true;
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      updateThemeIcons();
    }

    // Check if a string looks like a URL
    function isUrl(str) {
      return typeof str === 'string' && (str.startsWith('http://') || str.startsWith('https://'));
    }

    // Render table
    function renderTable() {
      if (rawData.length === 0) {
        pageSubtitle.textContent = "No data found";
        return;
      }

      // Filter data based on search query
      const filteredData = searchQuery
        ? rawData.filter(row => 
            columns.some(col => String(row[col] || '').toLowerCase().includes(searchQuery))
          )
        : rawData;

      // Update subtitle
      pageSubtitle.textContent = `Showing ${filteredData.length} of ${rawData.length} records`;

      // Render table header
      tableHead.innerHTML = `
        <tr>
          ${columns.map(col => `<th>${formatColumnName(col)}</th>`).join('')}
        </tr>
      `;

      // Render table body
      if (filteredData.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="${columns.length}">
              <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/>
                  <path d="m21 21-4.3-4.3"/>
                </svg>
                <p>No results found for "${searchQuery}"</p>
              </div>
            </td>
          </tr>
        `;
      } else {
        tableBody.innerHTML = filteredData.map(row => `
          <tr>
            ${columns.map(col => {
              const cellValue = row[col];
              const cellStr = cellValue === null || cellValue === undefined ? '' : String(cellValue);
              
              if (isUrl(cellStr)) {
                return `<td class="link-cell"><a href="${cellStr}" target="_blank" rel="noopener noreferrer">Apply</a></td>`;
              }
              return `<td title="${cellStr}">${cellStr}</td>`;
            }).join('')}
          </tr>
        `).join('');
      }
    }

    // Initialize
    loadTheme();
    loadJSON();
  </script>
</body>
</html>
